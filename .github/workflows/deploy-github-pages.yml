# Build and deploy the Vite app to GitHub Pages (https://<user>.github.io/<repo-name>/).
# After the first successful run: Repo → Settings → Pages → Source = "GitHub Actions" (not branch).
# Local test: npm run build (uses .env.production, base ./) && npm run preview

name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Build
        # Redundant with vite.config: ensures CI never ships "/" base if .env.production is missing.
        env:
          VITE_BASE_PATH: './'
        run: npm run build
      - name: Check build output
        run: |
          set -e
          test -f dist/index.html
          test -d dist/assets
          if grep -qE 'src="/assets/|href="/assets/' dist/index.html; then
            echo "ERROR: index uses /assets/ at site root; GitHub project Pages needs ./assets/ (see vite base + VITE_BASE_PATH)."
            head -n 25 dist/index.html
            exit 1
          fi
          ls -la dist/ | head -20
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
